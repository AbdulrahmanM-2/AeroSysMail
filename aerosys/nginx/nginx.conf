# ═══════════════════════════════════════════════
# AeroSysMail — Nginx reverse proxy + static serve
# ═══════════════════════════════════════════════

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  upstream api_backend {
    server api:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # API — proxy to Node backend
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade          $http_upgrade;
      proxy_set_header   Connection       'upgrade';
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # Auth routes — stricter rate limit
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # Health check — no rate limit
    location /api/health {
      proxy_pass http://api_backend;
    }

    # Frontend SPA — served by Node's express.static
    # All other routes proxy to API which serves index.html
    location / {
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
  }

  # HTTPS server (enable when SSL certs are available)
  # server {
  #   listen 443 ssl http2;
  #   server_name aerosys.aero;
  #   ssl_certificate     /etc/nginx/certs/cert.pem;
  #   ssl_certificate_key /etc/nginx/certs/key.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ... same locations as above ...
  # }
}
