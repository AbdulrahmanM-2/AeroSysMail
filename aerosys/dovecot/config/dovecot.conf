# AeroSysMail — Dovecot IMAP config
protocols = imap

# Listen on all interfaces
listen = *

# Mail location — Maildir format (shared volume with Postfix)
mail_location = maildir:/var/mail/vhosts/%d/%n

# Auth — plain for internal use (add SSL certs for production)
auth_mechanisms = plain login

passdb {
  driver = passwd-file
  args   = /etc/dovecot/users
}
userdb {
  driver = passwd-file
  args   = /etc/dovecot/users
}

# IMAP
service imap-login {
  inet_listener imap  { port = 143; }
  inet_listener imaps { port = 993; ssl = yes; }
}

# SSL (self-signed)
ssl = yes
ssl_cert = </etc/ssl/certs/ssl-cert-snakeoil.pem
ssl_key  = </etc/ssl/private/ssl-cert-snakeoil.key

# Logging to stdout
log_path      = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stdout

# Namespace (inbox)
namespace inbox {
  inbox = yes
  mailbox Drafts    { special_use = \Drafts;    auto = subscribe; }
  mailbox Sent      { special_use = \Sent;      auto = subscribe; }
  mailbox Trash     { special_use = \Trash;     auto = subscribe; }
  mailbox Spam      { special_use = \Junk;      auto = subscribe; }
  mailbox Starred   { special_use = \Flagged;   auto = subscribe; }
  mailbox Important { auto = subscribe; }
}

service auth {
  unix_listener auth-userdb { mode = 0666; }
}
