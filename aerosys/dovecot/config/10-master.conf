# AeroSysMail — Master processes
service imap-login {
  inet_listener imaps {
    port = 993
    ssl = yes
  }
  inet_listener imap {
    port = 143
  }
}

service lmtp {
  inet_listener lmtp {
    address = *
    port = 24
  }
  unix_listener lmtp {
    mode = 0666
  }
}

service imap {
  executable = imap
}
