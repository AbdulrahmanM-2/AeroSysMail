version: '3.8'

# ═══════════════════════════════════════════════
# AeroSysMail — Full Docker Stack
# Services: db · redis · minio · api · postfix · dovecot · nginx
# ═══════════════════════════════════════════════

services:

  # ── MySQL 8 ─────────────────────────────────
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      aerosys
      MYSQL_USER:          aerosys
      MYSQL_PASSWORD:      secret
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uaerosys", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────
  minio:
    image: minio/minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Node.js API ──────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT:                3000
      NODE_ENV:            production
      JWT_SECRET:          aerosys-super-secret-jwt-key-change-in-production
      DB_HOST:             db
      DB_PORT:             3306
      DB_NAME:             aerosys
      DB_USER:             aerosys
      DB_PASSWORD:         secret
      REDIS_HOST:          redis
      REDIS_PORT:          6379
      MINIO_HOST:          minio
      MINIO_PORT:          9000
      MINIO_ROOT_USER:     minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_BUCKET:        aerosys-attachments
      SMTP_HOST:           postfix
      SMTP_PORT:           587
      MAIL_DOMAIN:         aerosys.aero
      CORS_ORIGIN:         "*"
    ports:
      - "3000:3000"
    volumes:
      - ./backend/public:/app/public:ro   # frontend static files
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Postfix (SMTP) ───────────────────────────
  postfix:
    build: ./postfix
    restart: unless-stopped
    hostname: mail.aerosys.aero
    ports:
      - "25:25"
      - "587:587"
    volumes:
      - mail-data:/var/mail
    environment:
      POSTFIX_myhostname: mail.aerosys.aero
      POSTFIX_mydomain:   aerosys.aero

  # ── Dovecot (IMAP) ───────────────────────────
  dovecot:
    build: ./dovecot
    restart: unless-stopped
    depends_on:
      - postfix
    ports:
      - "143:143"
      - "993:993"
    volumes:
      - mail-data:/var/mail

  # ── Nginx (reverse proxy + static) ───────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
  redis-data:
  mail-data:
  minio-data:

networks:
  default:
    name: aerosys-network
